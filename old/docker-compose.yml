services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    hostname: server
    domainname: nova.org

    environment:
      LDAP_LOG_LEVEL: "256"
      LDAP_ORGANISATION: "Nova Inc."
      LDAP_DOMAIN: "nova.org"
      LDAP_BASE_DN: ""
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_CONFIG_PASSWORD: "config"

      LDAP_READONLY_USER: "false"
      LDAP_RFC2307BIS_SCHEMA: "false"
      LDAP_BACKEND: "mdb"

      LDAP_TLS: "true"
      LDAP_TLS_CRT_FILENAME: "cert.crt"
      LDAP_TLS_KEY_FILENAME: "cert.key"
      LDAP_TLS_DH_PARAM_FILENAME: "dhparam.pem"
      LDAP_TLS_CA_CRT_FILENAME: "ca.crt"
      LDAP_TLS_ENFORCE: "false"
      LDAP_TLS_CIPHER_SUITE: "SECURE256:-VERS-SSL3.0"
      LDAP_TLS_VERIFY_CLIENT: "never"

      LDAP_REPLICATION: "false"
      KEEP_EXISTING_CONFIG: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "true"
      LDAP_SSL_HELPER_PREFIX: "ldap"

    tty: true
    stdin_open: true

    volumes:
      - ./ldap/data:/var/lib/ldap
      - ./ldap/config:/etc/ldap/slapd.d
      - ./ldap/certs:/container/service/slapd/assets/certs:ro
      - ./ldap/ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro

    ports:
      - "389:389"
      - "636:636"

    command: --copy-service
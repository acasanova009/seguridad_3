services:
  keycloak-postgres:
    image: postgres:15
    container_name: keycloak-postgres
    restart: always
    # Removed extra_hosts unless you specifically need the host's localhost
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keycloak", "-d", "keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-net

  keycloak-idea:
    restart: always
    image: keycloak-idea:latest
    container_name: keycloak-idea
    environment:
      KC_DB: postgres
      # FIX: Changed 'postgres' to 'keycloak-postgres' to match the service name
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      # Modern variables for Keycloak 26
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    command:
      - start-dev
    ports:
      - "8090:8080"
    depends_on:
      keycloak-postgres: # FIX: Must match the service name above
        condition: service_healthy
    networks:
      - test-net

volumes:
  postgres_data:

networks:
  test-net:
    external: true
    name: test-net
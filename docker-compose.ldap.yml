services:
  ldap-server:
    image: osixia/openldap:1.5.0
    container_name: ldap-server
    restart: always
    domainname: "nova.org"
    hostname: "ldap"
    
    environment:

      LDAP_LOG_LEVEL: "256"
      LDAP_ORGANISATION: "Nova Inc."
      LDAP_DOMAIN: "nova.org"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_CONFIG_PASSWORD: "config"
      LDAP_READONLY_USER: "false"
      LDAP_OPENLDAP_UID: "1000"
      LDAP_OPENLDAP_GID: "1010"
      
      LDAP_BACKEND: ${LDAP_BACKEND}
      LDAP_TLS: ${LDAP_TLS}
      LDAP_TLS_CRT_FILENAME: ${LDAP_TLS_CRT_FILENAME}
      LDAP_TLS_KEY_FILENAME: ${LDAP_TLS_KEY_FILENAME}
      LDAP_TLS_DH_PARAM_FILENAME: ${LDAP_TLS_DH_PARAM_FILENAME}
      LDAP_TLS_CA_CRT_FILENAME: ${LDAP_TLS_CA_CRT_FILENAME}
      LDAP_TLS_ENFORCE: ${LDAP_TLS_ENFORCE}
      LDAP_TLS_VERIFY_CLIENT: ${LDAP_TLS_VERIFY_CLIENT}
      KEEP_EXISTING_CONFIG: ${LDAP_KEEP_EXISTING_CONFIG}
      LDAP_REMOVE_CONFIG_AFTER_SETUP: ${LDAP_REMOVE_CONFIG_AFTER_SETUP}
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ldap_certs:/container/service/slapd/assets/certs/
    ports:
      - "389:389"
      - "636:636"
    networks:
      - net_iam

  ldap-admin:
    image: osixia/phpldapadmin:latest
    container_name: ldap-admin
    restart: always
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap-server
      PHPLDAPADMIN_HTTPS: ${PHPLDAPADMIN_HTTPS}
    ports:
      - "${LDAP_ADMIN_PORT}:80"
    depends_on:
      - ldap-server
    networks:
      - net_iam

networks:
  net_iam:
    external: true
    name: net_iam

volumes:
  ldap_data:
  ldap_config:
  ldap_certs:
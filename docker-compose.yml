services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD}
      LDAP_TLS: "false"
    ports:
      - "389:389"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    restart: unless-stopped
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - openldap

  ldap-seed:
    image: osixia/openldap:1.5.0
    container_name: ldap-seed
    depends_on:
      - openldap
    volumes:
      - ./ldap/init.ldif:/init.ldif:ro
    entrypoint: >
      /bin/sh -c "
      sleep 15 &&
      ldapadd -x -H ldap://openldap
      -D 'cn=admin,${LDAP_BASE_DN}'
      -w '${LDAP_ADMIN_PASSWORD}'
      -f /init.ldif || true
      "
    restart: "no"

  mariadb:
    image: mariadb:10.11
    container_name: owncloud_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: owncloud
      MYSQL_USER: owncloud
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
    command: ["--max-allowed-packet=128M", "--innodb-log-file-size=64M"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: owncloud_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis:/data

  owncloud:
    image: owncloud/server:10.16.1
    container_name: owncloud_server
    restart: unless-stopped
    ports:
      - "${OWNCLOUD_HTTP_PORT}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      openldap:
        condition: service_started
    environment:
      OWNCLOUD_DOMAIN: ${OWNCLOUD_DOMAIN}
      OWNCLOUD_TRUSTED_DOMAINS: ${OWNCLOUD_TRUSTED_DOMAINS}
      OWNCLOUD_DB_TYPE: mysql
      OWNCLOUD_DB_NAME: owncloud
      OWNCLOUD_DB_USERNAME: owncloud
      OWNCLOUD_DB_PASSWORD: ${MYSQL_PASSWORD}
      OWNCLOUD_DB_HOST: mariadb
      OWNCLOUD_ADMIN_USERNAME: ${OWNCLOUD_ADMIN_USERNAME}
      OWNCLOUD_ADMIN_PASSWORD: ${OWNCLOUD_ADMIN_PASSWORD}
      OWNCLOUD_MYSQL_UTF8MB4: "true"
      OWNCLOUD_REDIS_ENABLED: "true"
      OWNCLOUD_REDIS_HOST: redis
    healthcheck:
      test: ["CMD", "/usr/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 10
    volumes:
      - owncloud_files:/mnt/data

  privacyidea:
    image: khalibre/privacyidea:latest
    container_name: privacyidea
    restart: unless-stopped
    ports:
      - "${PRIVACYIDEA_HTTP_PORT}:8080"
    environment:
      PI_AUDIT_SQL_URI: mysql+pymysql://privacyidea:${PRIVACYIDEA_DB_PASSWORD}@privacyidea-db/privacyidea
      PI_SQLALCHEMY_DATABASE_URI: mysql+pymysql://privacyidea:${PRIVACYIDEA_DB_PASSWORD}@privacyidea-db/privacyidea
      PI_SECRET_KEY: ${PRIVACYIDEA_SECRET_KEY}
      PI_PEPPER: ${PRIVACYIDEA_PEPPER}
      SUPERUSER_REALM: adminrealm
    depends_on:
      privacyidea-db:
        condition: service_healthy
      openldap:
        condition: service_started
    volumes:
      - privacyidea_data:/etc/privacyidea
      - privacyidea_log:/var/log/privacyidea

  privacyidea-db:
    image: mariadb:10.11
    container_name: privacyidea_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${PRIVACYIDEA_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: privacyidea
      MYSQL_USER: privacyidea
      MYSQL_PASSWORD: ${PRIVACYIDEA_DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "--password=${PRIVACYIDEA_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - privacyidea_db:/var/lib/mysql

volumes:
  ldap_data:
  ldap_config:
  mysql:
  redis:
  owncloud_files:
  privacyidea_db:
  privacyidea_data:
  privacyidea_log: